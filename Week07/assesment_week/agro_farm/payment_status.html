<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Payment Status</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4 [font-family:'Poppins',sans-serif]">

  <!-- Phone Frame -->
  <div class="relative w-[340px] sm:w-[375px] [aspect-ratio:9/19.5] rounded-[44px] overflow-hidden shadow-2xl border-4 border-gray-700 bg-[#e8e8e8] flex flex-col">

    <!-- Status Bar -->
    <div class="flex justify-between items-center px-6 pt-3 pb-2 text-gray-900 text-xs font-semibold shrink-0">
      <span>9:41</span>
      <div class="flex items-center gap-1.5">
        <svg class="w-4 h-3.5" viewBox="0 0 18 14" fill="#111">
          <rect x="0" y="8" width="3" height="6" rx="0.5"/>
          <rect x="5" y="5" width="3" height="9" rx="0.5"/>
          <rect x="10" y="2" width="3" height="12" rx="0.5"/>
          <rect x="15" y="0" width="3" height="14" rx="0.5"/>
        </svg>
        <svg class="w-4 h-3.5" viewBox="0 0 24 18" fill="#111">
          <path d="M12 14a2 2 0 110 4 2 2 0 010-4zm0-5a7 7 0 015.196 2.304l-1.768 1.768A4.5 4.5 0 0012 11.5a4.5 4.5 0 00-3.428 1.572L6.804 11.304A7 7 0 0112 9zm0-5a12 12 0 018.485 3.515l-1.768 1.768A9.5 9.5 0 0012 7a9.5 9.5 0 00-6.717 2.783L3.515 8.015A12 12 0 0112 4z"/>
        </svg>
        <svg class="w-6 h-3.5" viewBox="0 0 24 12" fill="none">
          <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="#111" stroke-opacity="0.5"/>
          <rect x="2" y="2" width="15" height="8" rx="1.5" fill="#111"/>
          <path d="M22 4v4a2 2 0 000-4z" fill="#111" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- Back to Marketplace bar -->
    <div class="mx-4 mt-1 shrink-0">
      <div class="bg-white rounded-2xl px-5 py-4 shadow-sm">
        <button class="flex items-center gap-3 text-gray-900 font-medium text-sm hover:opacity-70 transition-opacity cursor-pointer">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Back to Marketplace
        </button>
      </div>
    </div>

    <!-- Centre content: checkmark -->
    <div class="flex-1 flex items-center justify-center">
      <div class="w-44 h-44 rounded-full bg-[#1db800] flex items-center justify-center shadow-2xl">
        <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 52 L40 76 L82 30" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Payment Success banner -->
    <div class="mx-4 mb-4 shrink-0">
      <div class="bg-black rounded-2xl px-5 py-5 flex items-center justify-center">
        <p class="text-white text-xl font-bold tracking-wide">Payment Success !</p>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bg-white border-t border-gray-200 flex items-center justify-around px-6 py-3 shrink-0">
      <button class="text-gray-800 hover:text-[#2d6a2d] transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </button>
      <button class="text-gray-800 hover:text-[#2d6a2d] transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <button class="text-gray-800 hover:text-[#2d6a2d] transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M6 20v-1a6 6 0 0112 0v1"/>
        </svg>
      </button>
      <button class="text-gray-800 hover:text-red-500 transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 17l5-5-5-5"/>
          <path d="M21 12H9"/>
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        </svg>
      </button>
    </div>

  </div>

</body>
</html>
