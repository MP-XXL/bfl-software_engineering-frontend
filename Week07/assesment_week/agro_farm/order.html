<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Order</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4 [font-family:'Poppins',sans-serif]">

  <!-- Phone Frame -->
  <div class="relative w-[340px] sm:w-[375px] [aspect-ratio:9/19.5] rounded-[44px] overflow-hidden shadow-2xl border-4 border-gray-700 bg-white flex flex-col">

    <!-- ── TOP PRODUCT IMAGE SECTION ── -->
    <div class="relative bg-white shrink-0" style="height: 48%">

      <!-- Status Bar -->
      <div class="relative z-10 flex justify-between items-center px-6 pt-3 pb-1 text-gray-900 text-xs font-semibold">
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
          <svg class="w-4 h-3.5" viewBox="0 0 18 14" fill="#111">
            <rect x="0" y="8" width="3" height="6" rx="0.5"/>
            <rect x="5" y="5" width="3" height="9" rx="0.5"/>
            <rect x="10" y="2" width="3" height="12" rx="0.5"/>
            <rect x="15" y="0" width="3" height="14" rx="0.5"/>
          </svg>
          <svg class="w-4 h-3.5" viewBox="0 0 24 18" fill="#111">
            <path d="M12 14a2 2 0 110 4 2 2 0 010-4zm0-5a7 7 0 015.196 2.304l-1.768 1.768A4.5 4.5 0 0012 11.5a4.5 4.5 0 00-3.428 1.572L6.804 11.304A7 7 0 0112 9zm0-5a12 12 0 018.485 3.515l-1.768 1.768A9.5 9.5 0 0012 7a9.5 9.5 0 00-6.717 2.783L3.515 8.015A12 12 0 0112 4z"/>
          </svg>
          <svg class="w-6 h-3.5" viewBox="0 0 24 12" fill="none">
            <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="#111" stroke-opacity="0.5"/>
            <rect x="2" y="2" width="15" height="8" rx="1.5" fill="#111"/>
            <path d="M22 4v4a2 2 0 000-4z" fill="#111" fill-opacity="0.4"/>
          </svg>
        </div>
      </div>

      <!-- Back Button -->
      <div class="relative z-10 px-5 pt-1">
        <button class="text-gray-800 hover:opacity-70 transition-opacity cursor-pointer">
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </button>
      </div>

      <!-- Product Image: NPK Bag SVG -->
      <div class="flex items-center justify-center w-full" style="height: calc(100% - 68px)">
        <svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Bag body -->
          <rect x="20" y="20" width="160" height="200" rx="18" fill="white" stroke="#e0e0e0" stroke-width="2"/>

          <!-- Green left diagonal block -->
          <path d="M20 80 L20 200 Q20 218 38 218 L110 218 Z" fill="#43a047"/>

          <!-- Bright green stripe / swoosh -->
          <path d="M20 60 Q60 100 110 218 L80 218 Q30 100 20 50 Z" fill="#76c442"/>

          <!-- Yellow-green highlight strip -->
          <path d="M20 52 Q55 85 95 218 L80 218 Q42 90 20 48 Z" fill="#cddc39" opacity="0.7"/>

          <!-- White upper area -->
          <rect x="20" y="20" width="160" height="60" rx="18" fill="white"/>
          <rect x="20" y="55" width="160" height="25" fill="white"/>

          <!-- Leaf logo -->
          <path d="M60 48 C56 36 68 28 76 36 C72 30 64 34 60 48Z" fill="#2e7d32"/>
          <path d="M60 48 C66 36 78 38 76 36Z" fill="#43a047"/>

          <!-- NPK text -->
          <text x="82" y="44" font-size="22" font-weight="800" fill="#1b5e20" font-family="Poppins,Arial,sans-serif">NPK</text>

          <!-- Balance 15:15:15 text -->
          <text x="64" y="60" font-size="11" font-weight="600" fill="#333" font-family="Poppins,Arial,sans-serif">Balance 15:15:15</text>

          <!-- Large white leaf on green background -->
          <path d="M35 160 C30 130 55 105 75 120 C55 125 45 145 52 165 Z" fill="white" opacity="0.25"/>
          <path d="M35 160 C50 130 78 138 75 120 C68 140 55 155 52 165 Z" fill="white" opacity="0.35"/>

          <!-- Bottom right small branding box -->
          <rect x="130" y="110" width="40" height="28" rx="4" fill="white" opacity="0.85"/>
          <text x="150" y="122" text-anchor="middle" font-size="6" fill="#555" font-family="Poppins,Arial,sans-serif">Product From</text>
          <text x="150" y="132" text-anchor="middle" font-size="9" font-weight="700" fill="#1a1a1a" font-family="Poppins,Arial,sans-serif">a</text>

          <!-- Bottom marketing text -->
          <text x="100" y="206" text-anchor="middle" font-size="6" fill="white" opacity="0.8" font-family="Poppins,Arial,sans-serif">Marketed By</text>
          <text x="100" y="215" text-anchor="middle" font-size="7" font-weight="700" fill="white" font-family="Poppins,Arial,sans-serif">AGRO CARE</text>
        </svg>
      </div>
    </div>

    <!-- ── BOTTOM DETAIL CARD ── -->
    <div class="flex-1 bg-[#f0f0f0] rounded-t-[32px] flex flex-col px-6 pt-5 pb-4 -mt-4 relative z-10">

      <!-- Product Name -->
      <h2 class="text-gray-900 text-2xl font-extrabold leading-tight">NPK -15:15:15</h2>

      <!-- Description -->
      <p class="text-gray-600 text-sm font-medium leading-relaxed mt-3">
        NPK Prime 18:06:18+S+Mg Fertilizer For Vegetables Fruits and Flowers 100g 200g 500g 1kg
      </p>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Quantity + Price Row -->
      <div class="flex items-center justify-between mt-4">
        <!-- Quantity Controls -->
        <div class="flex items-center gap-3">
          <!-- Plus -->
          <button class="w-7 h-7 rounded-full border-2 border-gray-400 flex items-center justify-center text-gray-600 hover:border-[#2d6a2d] hover:text-[#2d6a2d] transition-colors cursor-pointer">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
            </svg>
          </button>
          <span class="text-gray-900 font-bold text-base w-6 text-center">01</span>
          <!-- Minus -->
          <button class="w-7 h-7 rounded-full border-2 border-gray-400 flex items-center justify-center text-gray-600 hover:border-[#2d6a2d] hover:text-[#2d6a2d] transition-colors cursor-pointer">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><path d="M8 12h8"/>
            </svg>
          </button>
        </div>
        <!-- Price -->
        <span class="text-gray-900 text-lg font-extrabold tracking-wide">RS.1500/=</span>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-3 mt-4">
        <button class="flex-1 bg-[#43a047] text-white font-bold text-sm py-3.5 rounded-xl hover:bg-[#388e3c] active:scale-95 transition-all cursor-pointer shadow-md">
          Buy Now
        </button>
        <button class="flex-1 bg-[#9e8d3c] text-white font-bold text-sm py-3.5 rounded-xl hover:bg-[#7d7030] active:scale-95 transition-all cursor-pointer shadow-md">
          Add to Cart
        </button>
      </div>

      <!-- Home Indicator -->
      <div class="flex justify-center mt-3">
        <div class="w-24 h-1 bg-gray-400/60 rounded-full"></div>
      </div>

    </div>

  </div>

</body>
</html>
