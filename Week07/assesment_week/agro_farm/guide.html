<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Fertilizer Guide</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body class="bg-gray-900 min-h-screen p-4 font-['Poppins',sans-serif]">

  <!-- Main Container -->
  <div class="max-w-6xl mx-auto min-h-screen flex flex-col">

    <!-- ── HEADER: Wheat field image ── -->
    <div class="relative h-[180px] md:h-[220px] shrink-0 rounded-2xl md:rounded-3xl overflow-hidden">
      <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80')] bg-cover bg-[center_30%]"></div>
      <div class="absolute inset-0 bg-[linear-gradient(to_bottom,rgba(220,180,80,0.15)_0%,rgba(15,12,5,0.50)_100%)]"></div>

      <!-- Status Bar -->
      <div class="relative z-10 flex justify-between items-center px-6 pt-3 pb-1 text-white text-xs font-semibold">
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
          <svg class="w-4 h-3.5" viewBox="0 0 18 14" fill="white">
            <rect x="0" y="8" width="3" height="6" rx="0.5"/>
            <rect x="5" y="5" width="3" height="9" rx="0.5"/>
            <rect x="10" y="2" width="3" height="12" rx="0.5"/>
            <rect x="15" y="0" width="3" height="14" rx="0.5"/>
          </svg>
          <svg class="w-4 h-3.5" viewBox="0 0 24 18" fill="white">
            <path d="M12 14a2 2 0 110 4 2 2 0 010-4zm0-5a7 7 0 015.196 2.304l-1.768 1.768A4.5 4.5 0 0012 11.5a4.5 4.5 0 00-3.428 1.572L6.804 11.304A7 7 0 0112 9zm0-5a12 12 0 018.485 3.515l-1.768 1.768A9.5 9.5 0 0012 7a9.5 9.5 0 00-6.717 2.783L3.515 8.015A12 12 0 0112 4z"/>
          </svg>
          <svg class="w-6 h-3.5" viewBox="0 0 24 12" fill="none">
            <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="white" stroke-opacity="0.5"/>
            <rect x="2" y="2" width="15" height="8" rx="1.5" fill="white"/>
            <path d="M22 4v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/>
          </svg>
        </div>
      </div>

      <!-- Page Title -->
      <div class="relative z-10 flex items-end h-[calc(100%-36px)] px-6 pb-6">
        <h1 class="text-white text-3xl md:text-4xl font-extrabold tracking-wide drop-shadow-lg leading-none">Fertilizer  Guide</h1>
      </div>
    </div>

    <!-- ── BODY: Light green with veggie watermark ── -->
    <div class="flex-1 bg-[#ddeedd] relative overflow-hidden flex flex-col rounded-2xl md:rounded-3xl mt-4">

      <!-- Watermark layer: scattered veggie outlines -->
      <div class="absolute inset-0 pointer-events-none overflow-hidden opacity-[0.09]">
        <!-- Tomato -->
        <svg class="absolute top-2 left-2 w-28 h-28" viewBox="0 0 100 100" fill="#2d6a2d">
          <circle cx="50" cy="58" r="32"/>
          <path d="M50 26 C38 10 28 18 32 30 C36 18 44 22 50 26Z"/>
          <path d="M50 26 C62 10 72 18 68 30 C64 18 56 22 50 26Z"/>
          <path d="M50 20 L50 30" stroke="#2d6a2d" stroke-width="3"/>
        </svg>
        <!-- Broccoli -->
        <svg class="absolute top-6 right-2 w-24 h-24" viewBox="0 0 100 100" fill="#2d6a2d">
          <circle cx="40" cy="30" r="18"/>
          <circle cx="60" cy="30" r="18"/>
          <circle cx="50" cy="20" r="18"/>
          <rect x="44" y="46" width="12" height="40" rx="6"/>
        </svg>
        <!-- Carrot -->
        <svg class="absolute top-44 left-4 w-20 h-20" viewBox="0 0 100 100" fill="#2d6a2d">
          <path d="M50 20 L30 85 L50 75 L70 85 Z"/>
          <path d="M50 20 C40 8 52 2 55 12"/>
          <path d="M50 20 C60 6 68 12 62 22"/>
        </svg>
        <!-- Cabbage -->
        <svg class="absolute top-48 right-3 w-24 h-24" viewBox="0 0 100 100" fill="#2d6a2d">
          <circle cx="50" cy="50" r="35"/>
          <ellipse cx="50" cy="50" rx="22" ry="35" opacity="0.5"/>
          <ellipse cx="50" cy="50" rx="35" ry="18" opacity="0.5"/>
        </svg>
        <!-- Leaf bottom left -->
        <svg class="absolute bottom-10 left-6 w-24 h-24" viewBox="0 0 100 100" fill="#2d6a2d">
          <path d="M20 80 C10 40 40 10 80 20 C50 30 30 55 35 80Z"/>
        </svg>
        <!-- Radish bottom right -->
        <svg class="absolute bottom-6 right-4 w-20 h-20" viewBox="0 0 100 100" fill="#2d6a2d">
          <circle cx="50" cy="60" r="28"/>
          <path d="M50 32 L50 15M40 32 C35 20 28 14 22 18M60 32 C65 20 72 14 78 18" stroke="#2d6a2d" stroke-width="5" fill="none"/>
        </svg>
      </div>

      <!-- Form fields -->
      <div class="relative z-10 flex flex-col items-center px-6 md:px-8 pt-12 md:pt-16 pb-6 flex-1 max-w-2xl mx-auto w-full">

        <!-- Crop Name Dropdown -->
        <div class="w-full mb-8">
          <select class="w-full bg-[#4caf50] rounded-xl px-6 py-5 text-white font-semibold text-base md:text-lg shadow-md cursor-pointer hover:bg-[#43a047] active:scale-[0.98] transition-all outline-none appearance-none">
            <option value="" disabled selected>Crop Name</option>
            <option value="tomato">Tomato</option>
            <option value="corn">Corn</option>
            <option value="wheat">Wheat</option>
            <option value="rice">Rice</option>
            <option value="potato">Potato</option>
            <option value="onion">Onion</option>
            <option value="carrot">Carrot</option>
            <option value="cabbage">Cabbage</option>
          </select>
        </div>

        <!-- Crop Week Dropdown -->
        <div class="w-full mb-8">
          <select class="w-full bg-[#4caf50] rounded-xl px-6 py-5 text-white font-semibold text-base md:text-lg shadow-md cursor-pointer hover:bg-[#43a047] active:scale-[0.98] transition-all outline-none appearance-none">
            <option value="" disabled selected>Crop Week</option>
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
            <option value="6">Week 6</option>
            <option value="7">Week 7</option>
            <option value="8">Week 8</option>
            <option value="9">Week 9</option>
            <option value="10">Week 10</option>
            <option value="11">Week 11</option>
            <option value="12">Week 12</option>
          </select>
        </div>

        <!-- Area Field -->
        <div class="w-full mb-10">
          <div class="bg-[#4caf50] rounded-xl px-6 py-5 flex items-center justify-between shadow-md">
            <span class="text-white font-semibold text-base md:text-lg">Area</span>
            <!-- Grey input box on the right -->
            <div class="bg-[#c8c8c8] rounded-md w-[100px] md:w-[120px] h-[42px] md:h-[48px] flex flex-col items-center justify-end pb-1.5 px-2">
              <input
                type="text"
                class="bg-transparent w-full text-gray-700 text-sm md:text-base font-medium outline-none text-center font-['Poppins',sans-serif]"
              />
              <div class="w-full border-b border-gray-500 mt-0.5"></div>
            </div>
          </div>
        </div>

        <!-- Spacer pushes submit to lower third -->
        <div class="flex-1"></div>

        <!-- Submit Button -->
        <button class="bg-[#f0e840] border-[3px] border-[#b8b000] text-gray-900 font-bold text-lg md:text-xl px-16 py-4 rounded-xl shadow-md hover:bg-[#e0d800] active:scale-95 transition-all cursor-pointer mb-4">
          Submit
        </button>

      </div>
    </div>

    <!-- ── BOTTOM NAV ── -->
    <div class="bg-white border-t border-gray-200 flex items-center justify-around px-6 py-4 shrink-0 rounded-2xl md:rounded-3xl mt-4">
      <button class="text-gray-800 hover:text-[#2d6a2d] transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </button>
      <button class="text-gray-800 hover:text-[#2d6a2d] transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <button class="text-gray-800 hover:text-[#2d6a2d] transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M6 20v-1a6 6 0 0112 0v1"/>
        </svg>
      </button>
      <button class="text-gray-800 hover:text-red-500 transition-colors cursor-pointer">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 17l5-5-5-5"/>
          <path d="M21 12H9"/>
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        </svg>
      </button>
    </div>

  </div>

</body>
</html>
