<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroFarm – Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body class="bg-[url('/src/img/unsplash_b-0-LM0wzWM.png')] bg-cover min-h-screen p-4 font-['Poppins',sans-serif]">

  <!-- Main Container -->
  <div class="max-w-6xl mx-auto">

    <!-- ── HEADER with farm bg ── -->
    <div class="relative h-[200px] md:h-[250px] shrink-0 overflow-hidden rounded-2xl md:rounded-3xl">

      <!-- Status Bar -->
      <div class="relative z-10 flex justify-between items-center px-6 pt-3 pb-1 text-white text-xs font-semibold">
        <span>9:41</span>
        <div class="flex items-center gap-1.5">
          <svg class="w-4 h-3.5" viewBox="0 0 18 14" fill="white">
            <rect x="0" y="8" width="3" height="6" rx="0.5"/>
            <rect x="5" y="5" width="3" height="9" rx="0.5"/>
            <rect x="10" y="2" width="3" height="12" rx="0.5"/>
            <rect x="15" y="0" width="3" height="14" rx="0.5"/>
          </svg>
          <svg class="w-4 h-3.5" viewBox="0 0 24 18" fill="white">
            <path d="M12 14a2 2 0 110 4 2 2 0 010-4zm0-5a7 7 0 015.196 2.304l-1.768 1.768A4.5 4.5 0 0012 11.5a4.5 4.5 0 00-3.428 1.572L6.804 11.304A7 7 0 0112 9zm0-5a12 12 0 018.485 3.515l-1.768 1.768A9.5 9.5 0 0012 7a9.5 9.5 0 00-6.717 2.783L3.515 8.015A12 12 0 0112 4z"/>
          </svg>
          <svg class="w-6 h-3.5" viewBox="0 0 24 12" fill="none">
            <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="white" stroke-opacity="0.5"/>
            <rect x="2" y="2" width="15" height="8" rx="1.5" fill="white"/>
            <path d="M22 4v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/>
          </svg>
        </div>
      </div>

      <!-- Greeting + Avatar -->
      <div class="relative z-10 flex items-center justify-between px-6 pt-3">
        <div>
          <h1 class="text-white text-3xl md:text-4xl font-extrabold leading-tight drop-shadow">Hi , Amal</h1>
          <p class="text-white/80 text-xl md:text-2xl font-bold tracking-wide drop-shadow">Dashboard</p>
        </div>
        <!-- Farmer avatar circle -->
        <div class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-white border-2 border-white shadow-lg flex items-center justify-center shrink-0">
          <svg width="48" height="48" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Hat brim -->
            <ellipse cx="30" cy="22" rx="17" ry="4" stroke="#333" stroke-width="2" fill="none"/>
            <!-- Hat dome -->
            <path d="M18 22 C18 14 42 14 42 22" stroke="#333" stroke-width="2" fill="none"/>
            <!-- Head -->
            <circle cx="30" cy="30" r="7" stroke="#333" stroke-width="2" fill="none"/>
            <!-- Body -->
            <path d="M23 37 C20 43 18 50 18 56" stroke="#333" stroke-width="2" stroke-linecap="round"/>
            <path d="M37 37 C40 43 42 50 42 56" stroke="#333" stroke-width="2" stroke-linecap="round"/>
            <path d="M23 37 Q30 43 37 37" stroke="#333" stroke-width="2" fill="none"/>
            <!-- Plant sprig -->
            <path d="M42 36 C45 32 50 32 52 35" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M44 39 C47 35 52 35 53 38" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M43 41 L52 33" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- ── BODY ── -->
    <div class="flex-1 flex flex-col px-4 md:px-6 pt-6 pb-8 overflow-hidden">

      <!-- Search Bar -->
      <div class="flex items-center bg-[#f5c842] rounded-xl px-4 py-3 shadow-md mb-6 md:mb-8">
        <input
          type="text"
          placeholder="Search here..."
          class="flex-1 bg-transparent text-white placeholder-white/80 text-sm md:text-base font-medium outline-none font-['Poppins',sans-serif]"
        />
        <svg class="w-7 h-7 text-white shrink-0" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
      </div>

      <!-- Responsive Menu Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 flex-1">

        <!-- Articles -->
        <a href="/articles.html" class="bg-white rounded-2xl border-2 border-gray-200 flex flex-col items-center justify-center gap-3 py-5 shadow-sm cursor-pointer hover:shadow-md active:scale-95 transition-all">
          <div class="w-16 h-16 rounded-full bg-[#4caf50] flex items-center justify-center">
            <!-- Home/House icon -->
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 15L17 4l12 11" fill="white" opacity="0.9"/>
              <path d="M5 15L17 4l12 11v13a1 1 0 01-1 1H6a1 1 0 01-1-1V15z" stroke="white" stroke-width="1.5" fill="white" fill-opacity="0.2"/>
              <rect x="12" y="20" width="10" height="8" rx="1" fill="white"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm">Articles</span>
        </a>

        <!-- Market -->
        <a href="/marketplace.html" class="bg-white rounded-2xl border-2 border-gray-200 flex flex-col items-center justify-center gap-3 py-5 shadow-sm cursor-pointer hover:shadow-md active:scale-95 transition-all">
          <!-- Market stall icon -->
          <div class="w-16 h-16 flex items-center justify-center">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Awning -->
              <path d="M6 18 L26 10 L46 18 L46 22 L6 22 Z" fill="#e53935"/>
              <!-- Awning stripes -->
              <path d="M12 18 L12 22" stroke="white" stroke-width="2"/>
              <path d="M18 15 L18 22" stroke="white" stroke-width="2"/>
              <path d="M26 13 L26 22" stroke="white" stroke-width="2"/>
              <path d="M34 15 L34 22" stroke="white" stroke-width="2"/>
              <path d="M40 18 L40 22" stroke="white" stroke-width="2"/>
              <!-- Scalloped bottom -->
              <path d="M6 22 Q9 26 12 22 Q15 26 18 22 Q21 26 24 22 Q27 26 30 22 Q33 26 36 22 Q39 26 42 22 Q44 26 46 22" stroke="#e53935" stroke-width="2" fill="none"/>
              <!-- Shop body -->
              <rect x="10" y="24" width="32" height="20" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
              <!-- Bag / box -->
              <rect x="19" y="28" width="14" height="12" rx="2" fill="#f5c842" stroke="#e8b830" stroke-width="1.5"/>
              <path d="M22 28 Q22 24 26 24 Q30 24 30 28" stroke="#e8b830" stroke-width="1.5" fill="none"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm">Market</span>
        </a>

        <!-- Guide -->
        <a href="/guide.html" class="bg-white rounded-2xl border-2 border-gray-200 flex flex-col items-center justify-center gap-3 py-5 shadow-sm cursor-pointer hover:shadow-md active:scale-95 transition-all">
          <div class="w-16 h-16 flex items-center justify-center">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Book body -->
              <rect x="10" y="8" width="26" height="34" rx="3" fill="#8b5e3c" stroke="#6d4a2d" stroke-width="1.5"/>
              <!-- Book spine -->
              <rect x="10" y="8" width="6" height="34" rx="3" fill="#6d4a2d"/>
              <!-- Pages lines -->
              <line x1="20" y1="16" x2="32" y2="16" stroke="#f5ddb0" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="20" y1="20" x2="32" y2="20" stroke="#f5ddb0" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="20" y1="24" x2="32" y2="24" stroke="#f5ddb0" stroke-width="1.5" stroke-linecap="round"/>
              <!-- Person icon on book -->
              <circle cx="25" cy="30" r="3" fill="#f5ddb0"/>
              <path d="M20 40 Q25 36 30 40" stroke="#f5ddb0" stroke-width="1.5" fill="none"/>
              <!-- Pencil -->
              <rect x="33" y="28" width="5" height="16" rx="1" fill="#f5c842" transform="rotate(-35 33 28)"/>
              <path d="M38 42 L40 47 L36 44 Z" fill="#f5c842"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm">Guide</span>
        </a>

        <!-- Reports -->
        <a href="/reports.html" class="bg-white rounded-2xl border-2 border-gray-200 flex flex-col items-center justify-center gap-3 py-5 shadow-sm cursor-pointer hover:shadow-md active:scale-95 transition-all">
          <div class="w-16 h-16 flex items-center justify-center">
            <svg width="48" height="52" viewBox="0 0 48 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Clipboard body -->
              <rect x="4" y="8" width="40" height="40" rx="4" fill="#f5c842" stroke="#e8b830" stroke-width="1.5"/>
              <!-- Clip at top -->
              <rect x="16" y="4" width="16" height="8" rx="3" fill="#5b8dd9" stroke="#4a7bc7" stroke-width="1.5"/>
              <!-- Checklist lines -->
              <rect x="10" y="20" width="5" height="5" rx="1" fill="white" stroke="#e8b830" stroke-width="1"/>
              <line x1="18" y1="22.5" x2="36" y2="22.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <rect x="10" y="29" width="5" height="5" rx="1" fill="white" stroke="#e8b830" stroke-width="1"/>
              <line x1="18" y1="31.5" x2="36" y2="31.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <rect x="10" y="38" width="5" height="5" rx="1" fill="white" stroke="#e8b830" stroke-width="1"/>
              <line x1="18" y1="40.5" x2="30" y2="40.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <!-- Check marks -->
              <path d="M11 22.5 L12.5 24 L15 21" stroke="#2d6a2d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11 31.5 L12.5 33 L15 30" stroke="#2d6a2d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="text-gray-800 font-semibold text-sm">Reports</span>
        </a>

      </div>
    </div>

  </div>

</body>
</html>
