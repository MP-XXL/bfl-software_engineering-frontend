<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - British School</title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="m-0 p-0">
    <main class="flex min-h-screen">
        <!-- Left Section -->
        <section class="w-1/2 bg-linear-to-br from-blue-400 to-blue-600 relative overflow-hidden">
            <!-- Background Image -->
            <div class="absolute inset-0 bg-black opacity-20"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <img src="/src/img/hero-3-cover.png" alt="Student" class="max-w-full max-h-full object-cover opacity-80">
            </div>
            
            <!-- Decorative elements -->
            <div class="absolute top-10 left-10 w-32 h-32 border-4 border-white rounded-full opacity-30"></div>
            <div class="absolute bottom-20 right-20 w-20 h-20 bg-white rounded-full opacity-20"></div>
            <div class="absolute top-40 right-40 w-16 h-16 border-2 border-white rounded-full opacity-40"></div>
            <div class="absolute bottom-40 left-20 w-12 h-12 bg-white rounded-full opacity-30"></div>
            
            <!-- Decorative lines -->
            <div class="absolute top-0 left-0 w-full h-1 bg-white opacity-20"></div>
            <div class="absolute bottom-0 left-0 w-full h-1 bg-white opacity-20"></div>
            <div class="absolute top-0 left-0 w-1 h-full bg-white opacity-20"></div>
            <div class="absolute top-0 right-0 w-1 h-full bg-white opacity-20"></div>
        </section>
        
        <!-- Right Section -->
        <section class="w-1/2 bg-white relative overflow-hidden">
            <!-- Decorative circles -->
            <div class="absolute top-10 right-10 w-16 h-16 border-2 border-blue-200 rounded-full opacity-50"></div>
            <div class="absolute bottom-20 left-10 w-12 h-12 bg-blue-100 rounded-full opacity-40"></div>
            <div class="absolute top-40 left-20 w-8 h-8 border-2 border-yellow-300 rounded-full opacity-60"></div>
            
            <div class="relative z-10 p-12 flex flex-col h-full">
                <!-- Logo -->
                <div class="mb-8">
                    <a href="index.html">
                        <img src="/src/img/British School 1.png" alt="THE BRITISH SCHOOL" class="h-12">
                    </a>
                </div>
                
                <!-- Registration Form -->
                <div class="grow flex flex-col justify-center max-w-md mx-auto w-full">
                    <!-- Header -->
                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-bold text-gray-800 mb-2">Registration Form</h2>
                        <p class="text-gray-600">
                            Already have an account? 
                            <a href="#" class="text-blue-500 hover:text-blue-600 font-medium">Login</a>
                        </p>
                    </div>
                    
                    <!-- Form -->
                    <form class="space-y-4">
                        <!-- First Name and Last Name -->
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="First Name">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Last Name">
                            </div>
                        </div>
                        
                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Enter Email</label>
                            <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter Email">
                        </div>
                        
                        <!-- Confirm Email -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Email</label>
                            <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Confirm Email">
                        </div>
                        
                        <!-- Phone Number -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                            <input type="tel" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Phone Number">
                        </div>
                        
                        <!-- Token -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Token</label>
                            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Token">
                        </div>
                        
                        <!-- Gender -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Gender</label>
                            <div class="flex gap-6">
                                <label class="flex items-center">
                                    <input type="radio" name="gender" value="male" class="mr-2 text-blue-500 focus:ring-blue-500">
                                    <span class="text-gray-700">Male</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" name="gender" value="female" class="mr-2 text-blue-500 focus:ring-blue-500">
                                    <span class="text-gray-700">Female</span>
                                </label>
                            </div>
                        </div>
                        
                        <!-- Department -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                            <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="">Select Department</option>
                                <option value="science">Science</option>
                                <option value="mathematics">Mathematics</option>
                                <option value="english">English</option>
                                <option value="history">History</option>
                                <option value="arts">Arts</option>
                            </select>
                        </div>
                        
                        <!-- Register Button -->
                        <a href="admin_dashboard.html" class="block w-full bg-linear-to-r from-blue-500 to-blue-600 text-white py-3 rounded-lg font-semibold hover:from-blue-600 hover:to-blue-700 transition-all duration-200 shadow-lg hover:shadow-xl text-center">
                            REGISTER
                        </a>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
